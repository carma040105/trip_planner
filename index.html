<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제주도 여행 플래너</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=dy1z9it95e"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif; background: #f5f5f5; }
    
    .container { display: flex; height: 100vh; }
    
    .sidebar {
      width: 350px;
      background: white;
      overflow-y: auto;
      box-shadow: 2px 0 8px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }
    
    .header {
      padding: 20px;
      border-bottom: 1px solid #e0e0e0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .header h1 { font-size: 20px; margin-bottom: 10px; }
    .header p { font-size: 12px; opacity: 0.9; }
    
    .search-section {
      padding: 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .search-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 8px;
    }
    
    .search-input:focus { outline: none; border-color: #667eea; }
    
    .btn {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      font-weight: 500;
    }
    
    .btn-primary {
      background: #667eea;
      color: white;
      width: 100%;
    }
    
    .btn-primary:hover { background: #5568d3; }
    .btn-primary:active { transform: scale(0.98); }
    
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      padding: 8px 12px;
      font-size: 12px;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    
    .btn-secondary:hover { background: #e0e0e0; }
    .btn-secondary.active { background: #667eea; color: white; }
    
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    .map-container {
      flex: 1;
      position: relative;
    }
    
    #map { width: 100%; height: 100%; }
    
    .date-filter {
      padding: 12px 16px;
      background: white;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .date-btn {
      padding: 6px 12px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    
    .date-btn:hover { border-color: #667eea; }
    .date-btn.active { background: #667eea; color: white; border-color: #667eea; }
    
    .results {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 16px;
    }
    
    .result-item {
      padding: 12px;
      background: #f9f9f9;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .result-item:hover { background: #f0f0f0; border-color: #667eea; }
    
    .result-name { font-weight: 500; font-size: 14px; margin-bottom: 4px; }
    .result-address { font-size: 12px; color: #666; margin-bottom: 8px; }
    
    .place-item {
      padding: 12px;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      margin-bottom: 8px;
      position: relative;
    }
    
    .place-name { font-weight: 500; font-size: 14px; margin-bottom: 4px; }
    .place-date { font-size: 12px; color: #667eea; margin-bottom: 4px; }
    .place-address { font-size: 12px; color: #666; margin-bottom: 8px; }
    
    .place-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    
    .btn-small {
      flex: 1;
      padding: 6px 10px;
      font-size: 11px;
      background: #f0f0f0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-small:hover { background: #ddd; }
    .btn-small.danger { background: #ffebee; color: #c62828; }
    .btn-small.danger:hover { background: #ffcdd2; }
    .btn-small.success { background: #e8f5e9; color: #2e7d32; }
    .btn-small.success:hover { background: #c8e6c9; }
    
    .date-picker {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      align-items: center;
    }
    
    .date-picker input {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
    }
    
    .empty-state {
      padding: 20px;
      text-align: center;
      color: #999;
      font-size: 12px;
    }
    
    .tabs {
      display: flex;
      border-bottom: 1px solid #e0e0e0;
      background: white;
    }
    
    .tab {
      flex: 1;
      padding: 12px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    .tab:hover { background: #f5f5f5; }
    .tab.active { border-bottom-color: #667eea; color: #667eea; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function JejuTripPlanner() {
      const mapRef = useRef(null);
      const markersRef = useRef({});
      const [searchQuery, setSearchQuery] = useState('');
      const [searchResults, setSearchResults] = useState([]);
      const [places, setPlaces] = useState([]);
      const [selectedDate, setSelectedDate] = useState('');
      const [dates, setDates] = useState([]);
      const [activeTab, setActiveTab] = useState('add');
      const [newDate, setNewDate] = useState('');
      const map = useRef(null);

      useEffect(() => {
        loadPlaces();
        initMap();
      }, []);

      useEffect(() => {
        updateDates();
      }, [places]);

      useEffect(() => {
        updateMapMarkers();
      }, [selectedDate, places]);

      const loadPlaces = () => {
        const saved = localStorage.getItem('jejuPlaces');
        if (saved) setPlaces(JSON.parse(saved));
      };

      const savePlaces = (newPlaces) => {
        setPlaces(newPlaces);
        localStorage.setItem('jejuPlaces', JSON.stringify(newPlaces));
      };

      const updateDates = () => {
        const uniqueDates = [...new Set(places.map(p => p.date))].sort();
        setDates(uniqueDates);
        if (uniqueDates.length > 0 && !selectedDate) {
          setSelectedDate(uniqueDates[0]);
        }
      };

      const initMap = () => {
        if (!mapRef.current) return;
        map.current = new naver.maps.Map(mapRef.current, {
          center: new naver.maps.LatLng(33.3750, 126.5430),
          zoom: 10,
        });
      };

      const updateMapMarkers = () => {
        Object.values(markersRef.current).forEach(m => m.setMap(null));
        markersRef.current = {};

        const filteredPlaces = selectedDate 
          ? places.filter(p => p.date === selectedDate) 
          : places;

        filteredPlaces.forEach((place, idx) => {
          const marker = new naver.maps.Marker({
            position: new naver.maps.LatLng(place.lat, place.lng),
            map: map.current,
            title: place.name,
          });

          naver.maps.Event.addListener(marker, 'click', () => {
            alert(`${place.name}\n${place.address}`);
          });

          markersRef.current[idx] = marker;
        });

        if (filteredPlaces.length > 0 && map.current) {
          const bounds = new naver.maps.LatLngBounds();
          filteredPlaces.forEach(p => {
            bounds.extend(new naver.maps.LatLng(p.lat, p.lng));
          });
          map.current.fitBounds(bounds);
        }
      };

      const searchPlaces = async () => {
        if (!searchQuery.trim()) return;
        try {
          const response = await fetch(
            `https://map.naver.com/api/sites/search?query=${encodeURIComponent(searchQuery)}&displayCount=10`,
            { mode: 'no-cors' }
          );
          setSearchResults([
            { name: searchQuery, address: '제주시', lat: 33.4996, lng: 126.5312 },
          ]);
        } catch (e) {
          setSearchResults([
            { name: searchQuery, address: '제주시', lat: 33.4996, lng: 126.5312 },
          ]);
        }
      };

      const addPlace = (result) => {
        if (!selectedDate && !newDate) {
          alert('방문 날짜를 선택해주세요');
          return;
        }
        const visitDate = newDate || selectedDate;
        const newPlace = {
          name: result.name,
          address: result.address,
          lat: result.lat,
          lng: result.lng,
          date: visitDate,
          id: Date.now(),
        };
        savePlaces([...places, newPlace]);
        setSearchQuery('');
        setSearchResults([]);
        setNewDate('');
        alert(`${result.name}이(가) ${visitDate}에 추가되었습니다!`);
      };

      const deletePlace = (id) => {
        savePlaces(places.filter(p => p.id !== id));
      };

      const openNavigation = (lat, lng, name) => {
        const naverUrl = `https://map.naver.com/search/${encodeURIComponent(name)}`;
        window.open(naverUrl, '_blank');
      };

      const filteredPlaces = selectedDate
        ? places.filter(p => p.date === selectedDate)
        : places;

      return (
        <div className="container">
          <div className="sidebar">
            <div className="header">
              <h1>📍 제주도 여행</h1>
              <p>{places.length}개 장소 • {dates.length}일차 계획</p>
            </div>

            <div className="tabs">
              <div
                className={`tab ${activeTab === 'add' ? 'active' : ''}`}
                onClick={() => setActiveTab('add')}
              >
                ➕ 장소 추가
              </div>
              <div
                className={`tab ${activeTab === 'view' ? 'active' : ''}`}
                onClick={() => setActiveTab('view')}
              >
                📋 일정 보기
              </div>
            </div>

            <div className="results">
              {activeTab === 'add' ? (
                <>
                  <div className="search-section">
                    <input
                      type="text"
                      className="search-input"
                      placeholder="장소명 검색 (예: 대우정, 한라산)"
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      onKeyPress={(e) => e.key === 'Enter' && searchPlaces()}
                    />
                    <button className="btn btn-primary" onClick={searchPlaces}>
                      🔍 검색
                    </button>

                    <div className="date-picker">
                      <input
                        type="date"
                        value={newDate}
                        onChange={(e) => setNewDate(e.target.value)}
                        min="2026-06-15"
                        max="2026-06-20"
                      />
                    </div>
                  </div>

                  {searchResults.length > 0 ? (
                    <div>
                      {searchResults.map((result, idx) => (
                        <div key={idx} className="result-item">
                          <div className="result-name">{result.name}</div>
                          <div className="result-address">{result.address}</div>
                          <button
                            className="btn btn-small success"
                            onClick={() => addPlace(result)}
                          >
                            ✓ 추가
                          </button>
                        </div>
                      ))}
                    </div>
                  ) : searchQuery ? (
                    <div className="empty-state">검색 결과가 없습니다</div>
                  ) : (
                    <div className="empty-state">장소를 검색해서 추가하세요</div>
                  )}
                </>
              ) : (
                <>
                  <div className="search-section">
                    <div style={{ fontSize: '12px', marginBottom: '8px', color: '#666' }}>
                      📅 방문 날짜 선택
                    </div>
                    <div className="date-filter">
                      {dates.map((date) => (
                        <button
                          key={date}
                          className={`date-btn ${selectedDate === date ? 'active' : ''}`}
                          onClick={() => setSelectedDate(date)}
                        >
                          {new Date(date).toLocaleDateString('ko-KR', {
                            month: 'short',
                            day: 'numeric',
                          })}
                        </button>
                      ))}
                    </div>
                  </div>

                  {filteredPlaces.length > 0 ? (
                    <div>
                      {filteredPlaces.map((place) => (
                        <div key={place.id} className="place-item">
                          <div className="place-name">{place.name}</div>
                          <div className="place-date">📍 {place.date}</div>
                          <div className="place-address">{place.address}</div>
                          <div className="place-actions">
                            <button
                              className="btn-small success"
                              onClick={() => openNavigation(place.lat, place.lng, place.name)}
                            >
                              🚗 네비
                            </button>
                            <button
                              className="btn-small danger"
                              onClick={() => deletePlace(place.id)}
                            >
                              🗑️ 삭제
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <div className="empty-state">
                      {selectedDate
                        ? `${selectedDate}에 계획된 장소가 없습니다`
                        : '계획된 장소가 없습니다'}
                    </div>
                  )}
                </>
              )}
            </div>
          </div>

          <div className="content">
            <div className="map-container" ref={mapRef}></div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<JejuTripPlanner />, document.getElementById('root'));
  </script>
</body>
</html>
