<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제주도 여행 플래너</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #eef0f4;
      color: #1f2937;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── 전체 레이아웃 ─── */
    #app { display:flex; height:100vh; overflow:hidden; }

    /* ─── 왼쪽 (30%) ─── */
    .left {
      width: 32%;
      min-width: 300px;
      background: #fff;
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 16px rgba(0,0,0,.10);
      z-index: 10;
      overflow: hidden;
    }

    .left-header {
      background: linear-gradient(135deg, #1e40af 0%, #6d28d9 100%);
      color: #fff;
      padding: 18px 20px 14px;
      flex-shrink: 0;
    }
    .left-header h1 { font-size: 17px; font-weight:700; }
    .left-header p  { font-size: 11px; opacity:.8; margin-top:3px; }

    /* 검색 */
    .search-wrap {
      padding: 10px 14px;
      border-bottom: 1px solid #e5e7eb;
      flex-shrink: 0;
    }
    .search-wrap input {
      width:100%; padding:8px 12px;
      border:1px solid #d1d5db; border-radius:6px;
      font-size:13px; font-family:inherit; outline:none;
    }
    .search-wrap input:focus { border-color:#3b82f6; box-shadow:0 0 0 3px #dbeafe; }

    /* 날짜 칩 */
    .date-bar {
      display:flex; gap:5px; padding:10px 14px;
      overflow-x:auto; border-bottom:1px solid #e5e7eb; flex-shrink:0;
    }
    .date-bar::-webkit-scrollbar { height:3px; }
    .date-bar::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:2px; }
    .d-chip {
      flex-shrink:0; padding:5px 11px; border-radius:20px;
      font-size:11px; font-weight:600; cursor:pointer;
      border:1px solid #d1d5db; background:#f9fafb; color:#374151;
      transition:all .15s; white-space:nowrap;
    }
    .d-chip:hover { border-color:#3b82f6; color:#3b82f6; }
    .d-chip.active { background:#2563eb; color:#fff; border-color:#2563eb; }
    .d-chip.fixed  { border-color:#f59e0b; }
    .d-chip.fixed.active { background:#b45309; border-color:#b45309; }

    /* 이벤트 리스트 */
    .evt-list { flex:1; overflow-y:auto; padding:12px 14px; }
    .evt-list::-webkit-scrollbar { width:4px; }
    .evt-list::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:2px; }

    /* 이벤트 카드 */
    .evt-card {
      border:1.5px solid #e2e8f0; border-radius:10px;
      padding:11px 13px; margin-bottom:9px;
      cursor:pointer; transition:all .15s;
      background:#fafbfc;
    }
    .evt-card:hover { border-color:#93c5fd; background:#f0f7ff; }
    .evt-card.sel   { border-color:#2563eb; background:#eff6ff; box-shadow:0 0 0 2px #bfdbfe; }
    .evt-card.fixed { border-left:4px solid #2563eb; }
    .c-time  { font-size:11px; font-weight:700; color:#2563eb; margin-bottom:3px; }
    .c-title { font-size:13px; font-weight:600; color:#111827; }
    .c-place { font-size:11px; color:#6b7280; margin-top:2px; }
    .c-memo  { font-size:11px; color:#9ca3af; margin-top:2px; font-style:italic; }

    .c-actions { display:flex; gap:5px; margin-top:9px; flex-wrap:wrap; }
    .c-btn {
      padding:3px 9px; border-radius:4px; font-size:11px; font-weight:600;
      border:none; cursor:pointer; transition:all .15s;
    }
    .c-btn.edit  { background:#dbeafe; color:#1d4ed8; }
    .c-btn.edit:hover  { background:#bfdbfe; }
    .c-btn.move  { background:#d1fae5; color:#065f46; }
    .c-btn.move:hover  { background:#a7f3d0; }
    .c-btn.del   { background:#fee2e2; color:#dc2626; }
    .c-btn.del:hover   { background:#fecaca; }

    .empty-state {
      text-align:center; color:#9ca3af; padding:32px 0; font-size:13px;
    }

    /* 추가 버튼 */
    .add-bar { padding:11px 14px; border-top:1px solid #e5e7eb; flex-shrink:0; }
    .add-btn {
      width:100%; padding:10px; background:#2563eb; color:#fff;
      border:none; border-radius:8px; font-size:13px; font-weight:600;
      cursor:pointer; transition:background .15s;
    }
    .add-btn:hover { background:#1d4ed8; }

    /* ─── 오른쪽 (70%) ─── */
    .right {
      flex:1; display:flex; flex-direction:column;
      overflow:hidden; background:#eef0f4;
    }

    /* 상단 상세 패널 */
    .detail {
      background:#fff; border-bottom:1px solid #e5e7eb;
      padding:22px 28px; flex-shrink:0;
    }
    .detail-empty {
      background:#fff; border-bottom:1px solid #e5e7eb;
      padding:22px 28px; color:#9ca3af; font-size:13px; flex-shrink:0;
    }
    .d-title   { font-size:22px; font-weight:700; color:#111827; margin-bottom:6px; }
    .d-time    { font-size:13px; color:#2563eb; font-weight:600; margin-bottom:6px; }
    .d-place   { font-size:13px; color:#374151; margin-bottom:4px; }
    .d-addr    { font-size:12px; color:#6b7280; margin-bottom:6px; }
    .d-memo    { font-size:13px; color:#6b7280; font-style:italic; margin-bottom:14px; }
    .d-btns    { display:flex; gap:10px; flex-wrap:wrap; }
    .d-btn {
      padding:8px 18px; border-radius:7px; font-size:13px; font-weight:600;
      border:none; cursor:pointer; transition:all .15s;
    }
    .d-btn.primary   { background:#2563eb; color:#fff; }
    .d-btn.primary:hover { background:#1d4ed8; }
    .d-btn.secondary { background:#f3f4f6; color:#374151; border:1px solid #d1d5db; }
    .d-btn.secondary:hover { background:#e5e7eb; }
    .d-btn.danger    { background:#fff; color:#dc2626; border:1px solid #fca5a5; }
    .d-btn.danger:hover { background:#fee2e2; }

    /* 하단 – 날짜별 요약 카드들 */
    .summary-area {
      flex:1; overflow-y:auto; padding:20px 24px;
    }
    .summary-area::-webkit-scrollbar { width:5px; }
    .summary-area::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:2px; }
    .summary-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }

    .sum-card {
      background:#fff; border-radius:12px; padding:16px;
      box-shadow:0 1px 6px rgba(0,0,0,.06); border:1.5px solid #e5e7eb;
      cursor:pointer; transition:all .18s;
    }
    .sum-card:hover { border-color:#93c5fd; box-shadow:0 4px 12px rgba(37,99,235,.12); }
    .sum-card.current { border-color:#2563eb; }
    .sum-card.fixed-day { border-top:4px solid #f59e0b; }
    .sum-date  { font-size:13px; font-weight:700; color:#1d4ed8; margin-bottom:8px; }
    .sum-count { font-size:11px; color:#9ca3af; margin-bottom:8px; }
    .sum-item  { font-size:12px; color:#374151; padding:3px 0;
                 border-bottom:1px solid #f3f4f6; }
    .sum-item:last-child { border-bottom:none; }
    .sum-empty { font-size:12px; color:#d1d5db; text-align:center; padding:8px 0; }

    /* ─── 모달 ─── */
    .modal-back {
      position:fixed; inset:0; background:rgba(0,0,0,.46);
      display:flex; align-items:center; justify-content:center; z-index:100;
    }
    .modal-box {
      background:#fff; border-radius:14px; padding:28px;
      width:480px; max-width:95vw; max-height:90vh;
      overflow-y:auto; box-shadow:0 24px 60px rgba(0,0,0,.18);
    }
    .modal-box::-webkit-scrollbar { width:4px; }
    .modal-box::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:2px; }
    .m-title { font-size:18px; font-weight:700; margin-bottom:20px; color:#111827; }

    /* 네이버맵 안내 박스 */
    .naver-guide {
      background:#f0fdf4; border:1.5px solid #86efac;
      border-radius:8px; padding:14px; margin-bottom:18px;
    }
    .naver-guide p { font-size:12px; color:#15803d; line-height:1.7; }
    .naver-open-btn {
      display:block; width:100%; margin-top:10px; padding:9px;
      background:#03c75a; color:#fff; border:none; border-radius:6px;
      font-size:13px; font-weight:700; cursor:pointer; transition:background .15s;
      font-family:inherit;
    }
    .naver-open-btn:hover { background:#02a94e; }

    .f-group { margin-bottom:13px; }
    .f-label { display:block; font-size:12px; font-weight:600; color:#374151; margin-bottom:4px; }
    .f-input, .f-textarea, .f-select {
      width:100%; padding:8px 11px; border:1px solid #d1d5db;
      border-radius:6px; font-size:13px; font-family:inherit;
      outline:none; color:#111827; background:#fff;
    }
    .f-input:focus, .f-textarea:focus { border-color:#3b82f6; box-shadow:0 0 0 3px #dbeafe; }
    .f-textarea { resize:vertical; min-height:60px; }
    .f-hint { font-size:11px; color:#9ca3af; margin-top:3px; }
    .f-url-row { display:flex; gap:6px; }
    .f-url-row .f-input { flex:1; }
    .f-url-clear {
      padding:8px 10px; background:#f3f4f6; border:1px solid #d1d5db;
      border-radius:6px; font-size:12px; cursor:pointer; white-space:nowrap;
    }
    .f-url-clear:hover { background:#e5e7eb; }

    .m-btns { display:flex; gap:9px; margin-top:20px; }
    .m-btn {
      flex:1; padding:11px; border:none; border-radius:7px;
      font-size:14px; font-weight:600; cursor:pointer; transition:all .15s; font-family:inherit;
    }
    .m-btn.ok  { background:#2563eb; color:#fff; }
    .m-btn.ok:hover  { background:#1d4ed8; }
    .m-btn.no  { background:#f3f4f6; color:#374151; }
    .m-btn.no:hover  { background:#e5e7eb; }

    /* 날짜이동 그리드 */
    .move-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
    .move-btn {
      padding:12px; border-radius:8px; border:1.5px solid #e5e7eb;
      background:#f9fafb; cursor:pointer; font-size:13px; font-weight:600;
      color:#374151; transition:all .15s; text-align:center; font-family:inherit;
    }
    .move-btn:hover   { border-color:#2563eb; color:#2563eb; background:#eff6ff; }
    .move-btn.current { border-color:#d1d5db; color:#9ca3af; cursor:default; background:#f3f4f6; }

    /* 반응형 */
    @media (max-width:900px) {
      .summary-grid { grid-template-columns:1fr 1fr; }
    }
    @media (max-width:768px) {
      #app { flex-direction:column; }
      .left { width:100%; min-width:0; height:50vh; }
      .right { height:50vh; }
      .summary-grid { grid-template-columns:1fr 1fr; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

/* ─── 상수 ─── */
const ALL_DATES = ['2026-06-15','2026-06-16','2026-06-17','2026-06-18','2026-06-19','2026-06-20'];
const FREE_DATES = ['2026-06-16','2026-06-17','2026-06-18','2026-06-19'];
const FIXED_SET  = new Set(['2026-06-15','2026-06-20']);

const FIXED = {
  '2026-06-15': [
    {id:'f1',  time:'02:30', title:'🏠 안양 집 출발',          placeName:'',               address:'경기 안양시',      memo:'완도항 09:20 배편 역산 출발',  naverMapUrl:''},
    {id:'f2',  time:'04:30', title:'⛽ 안성휴게소 수소 충전',  placeName:'안성휴게소',       address:'경기 안성시',      memo:'30분 충전 · 새벽 운영',        naverMapUrl:''},
    {id:'f3',  time:'07:40', title:'🚗 완도항 도착 & 선적',    placeName:'완도항',           address:'전남 완도군 완도읍',memo:'차량 선적 수속 시작',          naverMapUrl:'https://map.naver.com/v5/search/완도항'},
    {id:'f4',  time:'09:20', title:'⛴️ 실버클라우드호 출항', placeName:'완도항',           address:'',                 memo:'완도→제주 약 2시간 40분',      naverMapUrl:''},
    {id:'f5',  time:'12:00', title:'🏝️ 제주항 도착',          placeName:'제주항',           address:'제주 제주시',      memo:'차량 하선',                    naverMapUrl:''},
    {id:'f6',  time:'12:30', title:'🗺️ 붉은오름 이동',         placeName:'',               address:'',                 memo:'제주항→캠핑장 약 50분',        naverMapUrl:''},
    {id:'f7',  time:'13:30', title:'⛺ 캠핑장 입장 & 설영',   placeName:'붉은오름자연휴양림',address:'제주 서귀포시 표선면',memo:'5박 6일 여행 시작!',       naverMapUrl:'https://map.naver.com/v5/search/붉은오름자연휴양림'},
  ],
  '2026-06-20': [
    {id:'f8',  time:'06:00', title:'🔔 캠핑장 철수',           placeName:'붉은오름자연휴양림',address:'',               memo:'짐 정리 및 출발 준비',         naverMapUrl:''},
    {id:'f9',  time:'06:50', title:'🚗 제주항 도착 & 선적',    placeName:'제주항',           address:'제주 제주시',      memo:'차량 선적',                    naverMapUrl:''},
    {id:'f10', time:'08:20', title:'⛴️ 골드스텔라호 출항',   placeName:'제주항',           address:'',                 memo:'제주→완도 약 2시간 40분',      naverMapUrl:''},
    {id:'f11', time:'11:00', title:'🏖️ 완도항 도착',          placeName:'완도항',           address:'전남 완도군',      memo:'차량 하선',                    naverMapUrl:''},
    {id:'f12', time:'15:30', title:'⛽ 안성휴게소 수소 충전',  placeName:'안성휴게소',       address:'경기 안성시',      memo:'30분 충전',                    naverMapUrl:''},
    {id:'f13', time:'17:00', title:'🏠 안양 집 도착',          placeName:'',               address:'경기 안양시',      memo:'여행 완료! 🎉',               naverMapUrl:''},
  ],
};

const BLANK = { title:'', time:'', placeName:'', address:'', memo:'', naverMapUrl:'' };
const newId  = () => 'e' + Date.now() + Math.random().toString(36).slice(2,5);
const stamp  = () => new Date().toISOString();
const isFixed = id => typeof id === 'string' && id.startsWith('f');

function sortEvt(arr) {
  return [...arr].sort((a,b)=>(a.time||'').localeCompare(b.time||''));
}
function dateLabel(d) {
  return new Date(d+'T00:00').toLocaleDateString('ko-KR',{month:'short',day:'numeric',weekday:'short'});
}

/* ═══════════════ APP ═══════════════ */
function App() {
  const [selDate, setSelDate]     = useState('2026-06-16');
  const [selId,   setSelId]       = useState(null);
  const [search,  setSearch]      = useState('');
  const [modal,   setModal]       = useState(null); // {type:'add'|'edit'|'move', id?}
  const [form,    setForm]        = useState(BLANK);

  /* ─ 데이터 ─ */
  const [sched, setSched] = useState(() => {
    try {
      const s = localStorage.getItem('jejuSched_v4');
      if (s) return JSON.parse(s);
    } catch {}
    return { '2026-06-16':[], '2026-06-17':[], '2026-06-18':[], '2026-06-19':[] };
  });

  useEffect(() => {
    localStorage.setItem('jejuSched_v4', JSON.stringify(sched));
  }, [sched]);

  /* ─ 현재 날짜 이벤트 ─ */
  const rawEvents = FIXED_SET.has(selDate)
    ? (FIXED[selDate] || [])
    : sortEvt(sched[selDate] || []);

  const q = search.trim().toLowerCase();
  const events = q
    ? rawEvents.filter(e =>
        (e.title||'').toLowerCase().includes(q) ||
        (e.placeName||'').toLowerCase().includes(q) ||
        (e.address||'').toLowerCase().includes(q))
    : rawEvents;

  /* ─ 선택된 이벤트 ─ */
  const selEvent = (() => {
    if (!selId) return null;
    if (FIXED_SET.has(selDate)) return (FIXED[selDate]||[]).find(e=>e.id===selId)||null;
    return (sched[selDate]||[]).find(e=>e.id===selId)||null;
  })();

  /* ─ CRUD ─ */
  const openAdd  = () => { setForm(BLANK); setModal({type:'add'}); };
  const openEdit = (ev) => { setForm({title:ev.title||'',time:ev.time||'',placeName:ev.placeName||'',address:ev.address||'',memo:ev.memo||'',naverMapUrl:ev.naverMapUrl||''}); setModal({type:'edit',id:ev.id}); };
  const openMove = (ev) => { setModal({type:'move',id:ev.id}); };
  const closeModal = () => { setModal(null); setForm(BLANK); };
  const fc = (k,v) => setForm(p=>({...p,[k]:v}));

  const confirmAdd = () => {
    if (!form.title.trim()) { alert('일정명을 입력해주세요'); return; }
    const ev = { id:newId(), ...form, date:selDate, createdAt:stamp(), updatedAt:stamp() };
    setSched(p=>({...p,[selDate]:sortEvt([...(p[selDate]||[]), ev])}));
    setSelId(ev.id);
    closeModal();
  };

  const confirmEdit = () => {
    if (!form.title.trim()) { alert('일정명을 입력해주세요'); return; }
    setSched(p=>({...p,[selDate]:sortEvt((p[selDate]||[]).map(e=>e.id===modal.id?{...e,...form,updatedAt:stamp()}:e))}));
    closeModal();
  };

  const deleteEv = (ev) => {
    if (!window.confirm(`"${ev.title}" 일정을 삭제할까요?`)) return;
    setSched(p=>({...p,[selDate]:(p[selDate]||[]).filter(e=>e.id!==ev.id)}));
    if (selId===ev.id) setSelId(null);
  };

  const moveTo = (targetDate) => {
    const ev = (sched[selDate]||[]).find(e=>e.id===modal.id);
    if (!ev) { closeModal(); return; }
    setSched(p=>({
      ...p,
      [selDate]:(p[selDate]||[]).filter(e=>e.id!==modal.id),
      [targetDate]:sortEvt([...(p[targetDate]||[]), {...ev,date:targetDate,updatedAt:stamp()}]),
    }));
    setSelId(null);
    closeModal();
  };

  /* ─ 오른쪽 요약 데이터 ─ */
  const summaryDates = ALL_DATES.map(d => {
    const evs = FIXED_SET.has(d) ? (FIXED[d]||[]) : sortEvt(sched[d]||[]);
    return { date:d, events:evs };
  });

  return (
    <div id="app">

      {/* ════ 왼쪽 ════ */}
      <div className="left">

        <div className="left-header">
          <h1>📍 제주도 여행 플래너</h1>
          <p>완도 왕복 · 6/15 ~ 6/20 · 5박 6일</p>
        </div>

        <div className="search-wrap">
          <input type="text" placeholder="🔍 일정 · 장소 · 주소 검색..."
            value={search} onChange={e=>setSearch(e.target.value)} />
        </div>

        <div className="date-bar">
          {ALL_DATES.map(d=>(
            <button key={d}
              className={`d-chip${selDate===d?' active':''}${FIXED_SET.has(d)?' fixed':''}`}
              onClick={()=>{ setSelDate(d); setSelId(null); }}
            >
              {new Date(d+'T00:00').toLocaleDateString('ko-KR',{month:'short',day:'numeric'})}
              {FIXED_SET.has(d) && <div style={{fontSize:'9px'}}>고정</div>}
            </button>
          ))}
        </div>

        <div className="evt-list">
          {events.length === 0
            ? <div className="empty-state">
                <p>일정이 없습니다</p>
                {!FIXED_SET.has(selDate) && <p style={{fontSize:'12px',color:'#3b82f6',marginTop:'6px'}}>아래 버튼으로 추가하세요</p>}
              </div>
            : events.map(ev=>(
              <div key={ev.id}
                className={`evt-card${FIXED_SET.has(selDate)||isFixed(ev.id)?' fixed':''}${selId===ev.id?' sel':''}`}
                onClick={()=>setSelId(ev.id)}
              >
                {ev.time     && <div className="c-time">🕐 {ev.time}</div>}
                <div className="c-title">{ev.title}</div>
                {ev.placeName&& <div className="c-place">📌 {ev.placeName}</div>}
                {ev.address  && <div className="c-place" style={{color:'#9ca3af'}}>📍 {ev.address}</div>}
                {ev.memo     && <div className="c-memo">"{ev.memo}"</div>}

                {!isFixed(ev.id) && (
                  <div className="c-actions" onClick={e=>e.stopPropagation()}>
                    <button className="c-btn edit" onClick={()=>openEdit(ev)}>✏️ 수정</button>
                    <button className="c-btn move" onClick={()=>openMove(ev)}>📅 날짜변경</button>
                    <button className="c-btn del"  onClick={()=>deleteEv(ev)}>🗑 삭제</button>
                  </div>
                )}
              </div>
            ))
          }
        </div>

        {!FIXED_SET.has(selDate) && (
          <div className="add-bar">
            <button className="add-btn" onClick={openAdd}>
              ➕ 일정 추가 (네이버맵 링크 포함)
            </button>
          </div>
        )}
      </div>

      {/* ════ 오른쪽 ════ */}
      <div className="right">

        {/* 선택된 이벤트 상세 */}
        {selEvent ? (
          <div className="detail">
            <div className="d-title">{selEvent.title}</div>
            {selEvent.time     && <div className="d-time">🕐 {selEvent.time}</div>}
            {selEvent.placeName&& <div className="d-place">📌 {selEvent.placeName}</div>}
            {selEvent.address  && <div className="d-addr">📍 {selEvent.address}</div>}
            {selEvent.memo     && <div className="d-memo">"{selEvent.memo}"</div>}
            <div className="d-btns">
              {selEvent.naverMapUrl
                ? <button className="d-btn primary"
                    onClick={()=>window.open(selEvent.naverMapUrl,'_blank')}>
                    🗺️ 네이버지도 열기
                  </button>
                : <button className="d-btn primary"
                    onClick={()=>window.open('https://map.naver.com/v5/search/'+(encodeURIComponent(selEvent.placeName||selEvent.title)),'_blank')}>
                    🗺️ 네이버지도에서 검색
                  </button>
              }
              {!isFixed(selEvent.id) && <>
                <button className="d-btn secondary" onClick={()=>openEdit(selEvent)}>✏️ 수정</button>
                <button className="d-btn secondary" onClick={()=>openMove(selEvent)}>📅 날짜변경</button>
                <button className="d-btn danger"    onClick={()=>deleteEv(selEvent)}>🗑 삭제</button>
              </>}
            </div>
          </div>
        ) : (
          <div className="detail-empty">
            ← 왼쪽 일정 카드를 클릭하면 상세 정보가 여기에 표시됩니다
          </div>
        )}

        {/* 날짜별 요약 */}
        <div className="summary-area">
          <div className="summary-grid">
            {summaryDates.map(({date, events: evs})=>(
              <div key={date}
                className={`sum-card${date===selDate?' current':''}${FIXED_SET.has(date)?' fixed-day':''}`}
                onClick={()=>{ setSelDate(date); setSelId(null); }}
              >
                <div className="sum-date">{dateLabel(date)}</div>
                <div className="sum-count">{evs.length}개 일정{FIXED_SET.has(date)?' · 고정':''}</div>
                {evs.length === 0
                  ? <div className="sum-empty">미정</div>
                  : evs.slice(0,4).map(e=>(
                      <div key={e.id} className="sum-item">
                        {e.time&&<span style={{color:'#3b82f6',fontWeight:600,fontSize:'11px',marginRight:'5px'}}>{e.time}</span>}
                        {e.title}
                      </div>
                    ))
                }
                {evs.length > 4 && <div className="sum-item" style={{color:'#9ca3af'}}>+{evs.length-4}개 더...</div>}
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ════ 모달: 추가 / 수정 ════ */}
      {(modal?.type==='add'||modal?.type==='edit') && (
        <div className="modal-back" onClick={closeModal}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div className="m-title">{modal.type==='add'?'➕ 일정 추가':'✏️ 일정 수정'}</div>

            {/* 네이버맵 안내 – 추가 시에만 */}
            {modal.type==='add' && (
              <div className="naver-guide">
                <p>
                  <strong>📌 네이버맵에서 장소 링크 가져오기</strong><br/>
                  ① 아래 버튼으로 네이버지도를 엽니다<br/>
                  ② 원하는 장소 검색 → 장소 페이지에서<br/>
                  &nbsp;&nbsp;&nbsp;<strong>공유 버튼 → 링크 복사</strong><br/>
                  ③ 앱으로 돌아와 아래 링크 필드에 붙여넣기
                </p>
                <button className="naver-open-btn"
                  onClick={()=>window.open('https://map.naver.com/','_blank')}>
                  🗺️ 네이버지도 열기
                </button>
              </div>
            )}

            <div className="f-group">
              <label className="f-label">일정명 *</label>
              <input className="f-input" placeholder="예: 저녁 식사, 성산일출봉 관람..."
                value={form.title} onChange={e=>fc('title',e.target.value)} />
            </div>

            <div className="f-group">
              <label className="f-label">시간</label>
              <input className="f-input" type="time"
                value={form.time} onChange={e=>fc('time',e.target.value)} />
            </div>

            <div className="f-group">
              <label className="f-label">장소명</label>
              <input className="f-input" placeholder="예: 대우정, 성산일출봉..."
                value={form.placeName} onChange={e=>fc('placeName',e.target.value)} />
            </div>

            <div className="f-group">
              <label className="f-label">주소</label>
              <input className="f-input" placeholder="예: 제주 서귀포시 표선면..."
                value={form.address} onChange={e=>fc('address',e.target.value)} />
            </div>

            <div className="f-group">
              <label className="f-label">네이버맵 공유 링크</label>
              <div className="f-url-row">
                <input className="f-input"
                  placeholder="https://naver.me/xxxxx  또는  https://map.naver.com/..."
                  value={form.naverMapUrl} onChange={e=>fc('naverMapUrl',e.target.value)} />
                {form.naverMapUrl && (
                  <button className="f-url-clear" onClick={()=>fc('naverMapUrl','')}>✕</button>
                )}
              </div>
              <div className="f-hint">네이버지도 → 장소 → 공유 → 링크 복사 → 붙여넣기</div>
              {form.naverMapUrl && (
                <button style={{marginTop:'6px',padding:'5px 12px',background:'#f0fdf4',border:'1px solid #86efac',borderRadius:'5px',fontSize:'12px',cursor:'pointer',color:'#15803d'}}
                  onClick={()=>window.open(form.naverMapUrl,'_blank')}>
                  🔗 링크 미리 확인
                </button>
              )}
            </div>

            <div className="f-group">
              <label className="f-label">메모</label>
              <textarea className="f-textarea" placeholder="예약 필수, 웨이팅 있음, 주차 가능..."
                value={form.memo} onChange={e=>fc('memo',e.target.value)} />
            </div>

            <div className="m-btns">
              <button className="m-btn ok"
                onClick={modal.type==='add'?confirmAdd:confirmEdit}>
                {modal.type==='add'?'추가':'저장'}
              </button>
              <button className="m-btn no" onClick={closeModal}>취소</button>
            </div>
          </div>
        </div>
      )}

      {/* ════ 모달: 날짜 변경 ════ */}
      {modal?.type==='move' && (
        <div className="modal-back" onClick={closeModal}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div className="m-title">📅 날짜 변경</div>
            <p style={{fontSize:'13px',color:'#6b7280'}}>이동할 날짜를 선택하세요</p>
            <div className="move-grid">
              {FREE_DATES.map(d=>(
                <button key={d}
                  className={`move-btn${d===selDate?' current':''}`}
                  onClick={()=>d!==selDate && moveTo(d)}
                >
                  {dateLabel(d)}
                  {d===selDate&&<div style={{fontSize:'10px',color:'#9ca3af',marginTop:'3px'}}>현재</div>}
                </button>
              ))}
            </div>
            <div className="m-btns">
              <button className="m-btn no" style={{flex:'none',padding:'11px 28px'}}
                onClick={closeModal}>닫기</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
