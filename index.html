<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제주도 여행 플래너</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=dy1z9it95e"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
    
    .container { display: flex; height: 100vh; }
    
    .sidebar {
      width: 380px;
      background: white;
      overflow-y: auto;
      box-shadow: 2px 0 8px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }
    
    .header {
      padding: 20px;
      border-bottom: 1px solid #e0e0e0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .header h1 { font-size: 20px; margin-bottom: 10px; }
    .header p { font-size: 12px; opacity: 0.9; }
    
    .tabs {
      display: flex;
      border-bottom: 1px solid #e0e0e0;
      background: white;
      overflow-x: auto;
    }
    
    .tab {
      flex: 1;
      padding: 12px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
      white-space: nowrap;
    }
    
    .tab:hover { background: #f5f5f5; }
    .tab.active { border-bottom-color: #667eea; color: #667eea; }
    
    .content-area { flex: 1; overflow-y: auto; padding: 16px; }
    
    .btn {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      font-weight: 500;
      width: 100%;
    }
    
    .btn-primary {
      background: #667eea;
      color: white;
      margin-bottom: 12px;
    }
    
    .btn-primary:hover { background: #5568d3; }
    
    .schedule-block {
      background: #f0f8ff;
      border-left: 3px solid #667eea;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 4px;
      font-size: 12px;
    }
    
    .schedule-time {
      font-weight: 600;
      color: #667eea;
      margin-bottom: 4px;
    }
    
    .schedule-event {
      color: #333;
      line-height: 1.5;
      margin-bottom: 6px;
    }
    
    .date-filter {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    
    .date-btn {
      padding: 6px 12px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    
    .date-btn:hover { border-color: #667eea; }
    .date-btn.active { background: #667eea; color: white; border-color: #667eea; }
    
    .place-item {
      padding: 12px;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      margin-bottom: 10px;
      cursor: move;
      transition: all 0.2s;
    }
    
    .place-item:hover { background: #f9f9f9; border-color: #667eea; }
    
    .place-name { font-weight: 500; font-size: 14px; margin-bottom: 4px; }
    .place-category { font-size: 11px; background: #f0f0f0; color: #666; padding: 2px 6px; border-radius: 3px; display: inline-block; margin-bottom: 4px; }
    .place-address { font-size: 12px; color: #666; margin-bottom: 4px; }
    .place-phone { font-size: 11px; color: #999; }
    
    .place-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    
    .btn-small {
      flex: 1;
      padding: 6px 8px;
      font-size: 11px;
      background: #f0f0f0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-small:hover { background: #ddd; }
    .btn-small.nav { background: #e8f5e9; color: #2e7d32; }
    .btn-small.nav:hover { background: #c8e6c9; }
    .btn-small.danger { background: #ffebee; color: #c62828; }
    .btn-small.danger:hover { background: #ffcdd2; }
    
    .scheduled-item {
      padding: 12px;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      margin-bottom: 10px;
      position: relative;
    }
    
    .place-name { font-weight: 500; font-size: 14px; margin-bottom: 4px; }
    .place-date { font-size: 12px; color: #667eea; font-weight: 500; margin-bottom: 4px; }
    .place-category { font-size: 11px; background: #f0f0f0; color: #666; padding: 2px 6px; border-radius: 3px; display: inline-block; margin-bottom: 4px; }
    .place-address { font-size: 12px; color: #666; margin-bottom: 4px; }
    .place-phone { font-size: 11px; color: #999; }
    
    .empty-state {
      padding: 20px;
      text-align: center;
      color: #999;
      font-size: 12px;
    }
    
    .map-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    #map { flex: 1; width: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const REFERENCE_PLACES = [
      { id: 101, name: '성신밥곡', address: '제주 제주시 노형로', phone: '', category: '음식점', lat: 33.4980, lng: 126.5100 },
      { id: 102, name: '우금', address: '제주 제주시 애월읍', phone: '', category: '한식', lat: 33.4650, lng: 126.3080 },
      { id: 103, name: '이까슬소길', address: '제주 제주시 구좌읍', phone: '', category: '카페', lat: 33.5200, lng: 126.5850 },
      { id: 104, name: '코로하 카카오팰밀리', address: '제주 제주시 구좌읍', phone: '', category: '카페', lat: 33.5100, lng: 126.6000 },
      { id: 105, name: '광어다 표선 본점', address: '제주 서귀포시 표선면 표선로 181', phone: '064-784-5555', category: '해물/생선', lat: 33.2500, lng: 126.3210 },
      { id: 106, name: '더윤도리', address: '제주 제주시 서호로', phone: '', category: '카페', lat: 33.5050, lng: 126.5250 },
      { id: 107, name: '문게여럿', address: '제주 제주시 동문로', phone: '', category: '한식', lat: 33.5030, lng: 126.5280 },
      { id: 108, name: '남의15', address: '제주 제주시 조천읍', phone: '', category: '카페', lat: 33.4750, lng: 126.4900 },
      { id: 109, name: '반네식당', address: '제주 제주시 연동', phone: '', category: '한식', lat: 33.5090, lng: 126.5210 },
      { id: 110, name: '삼달리 벨녀른정원', address: '제주 제주시 삼도이동', phone: '', category: '해물요리', lat: 33.5120, lng: 126.5290 },
      { id: 111, name: '물질식육식당', address: '제주 제주시 애월읍', phone: '', category: '한식', lat: 33.4700, lng: 126.3150 },
      { id: 112, name: '둥막골 삶화정', address: '제주 제주시 조천읍', phone: '', category: '한식', lat: 33.4820, lng: 126.5380 },
      { id: 113, name: '해안로 보왕칼국수 본점', address: '제주 서귀포시 표선면', phone: '', category: '칼국수', lat: 33.2480, lng: 126.3190 },
      { id: 114, name: '가시리 수목원', address: '제주 서귀포시 대정읍 가시리', phone: '', category: '자연명소', lat: 33.2300, lng: 126.1900 },
      { id: 115, name: '소천지', address: '제주 서귀포시 보목동', phone: '', category: '자연명소', lat: 33.2400, lng: 126.3500 },
      { id: 116, name: '킹조배기러', address: '제주 제주시 용담2동', phone: '', category: '베이커리', lat: 33.5150, lng: 126.5200 },
      { id: 117, name: '대우정', address: '제주 제주시 동문로 14길 20', phone: '064-753-4567', category: '음식점', lat: 33.5062, lng: 126.5268 },
      { id: 118, name: '문게야', address: '제주 서귀포시 표선면 표선로 476-1', phone: '064-787-8900', category: '음식점', lat: 33.2480, lng: 126.3190 },
    ];

    const SCHEDULED_PLACES = [
      { id: 1, name: '안양 출발', address: '경기 안양시', category: '출발', lat: 37.3833, lng: 126.9533, date: '2026-06-15', time: '03:20' },
      { id: 2, name: '완도항 도착', address: '전남 완도군', category: '선적', lat: 34.3095, lng: 126.7269, date: '2026-06-15', time: '07:40~07:50' },
      { id: 3, name: '실버클라우드호 출항 (완도→제주)', address: '완도항', category: '배편', lat: 34.3095, lng: 126.7269, date: '2026-06-15', time: '09:20' },
      { id: 4, name: '제주항 도착', address: '제주 제주시', category: '항구', lat: 33.5090, lng: 126.5168, date: '2026-06-15', time: '12:00~12:15' },
      { id: 5, name: '붉은오름자연휴양림 입장', address: '제주 서귀포시 표선면', category: '숙소', lat: 33.3500, lng: 126.4500, date: '2026-06-15', time: '13:30' },
      
      { id: 6, name: '붉은오름자연휴양림 철수', address: '제주 서귀포시 표선면', category: '출발', lat: 33.3500, lng: 126.4500, date: '2026-06-20', time: '06:00' },
      { id: 7, name: '제주항 도착 (선적)', address: '제주 제주시', category: '선적', lat: 33.5090, lng: 126.5168, date: '2026-06-20', time: '07:00~07:10' },
      { id: 8, name: '골드스텔라호 출항 (제주→완도)', address: '제주항', category: '배편', lat: 33.5090, lng: 126.5168, date: '2026-06-20', time: '08:40' },
      { id: 9, name: '완도항 도착', address: '전남 완도군', category: '항구', lat: 34.3095, lng: 126.7269, date: '2026-06-20', time: '11:20~11:30' },
      { id: 10, name: '서울 복귀', address: '경기 안양시', category: '도착', lat: 37.3833, lng: 126.9533, date: '2026-06-20', time: '~15:20' },
    ];

    function JejuTripPlanner() {
      const mapRef = useRef(null);
      const [scheduledPlaces, setScheduledPlaces] = useState(() => {
        const saved = localStorage.getItem('jejuScheduled');
        return saved ? JSON.parse(saved) : SCHEDULED_PLACES;
      });
      
      const [referencePlaces] = useState(REFERENCE_PLACES);
      const [activeTab, setActiveTab] = useState('schedule');
      const [selectedDate, setSelectedDate] = useState('2026-06-15');
      const [dates, setDates] = useState([]);
      
      const map = useRef(null);
      const markersRef = useRef({});

      useEffect(() => {
        updateDates();
        initMap();
      }, []);

      useEffect(() => {
        saveScheduled(scheduledPlaces);
        updateMapMarkers();
      }, [scheduledPlaces, selectedDate]);

      const initMap = () => {
        if (!mapRef.current) return;
        map.current = new naver.maps.Map(mapRef.current, {
          center: new naver.maps.LatLng(33.3750, 126.5430),
          zoom: 10,
        });
      };

      const updateDates = () => {
        const allDates = [...new Set([...scheduledPlaces, ...referencePlaces.map(p => ({date: ''}))].map(p => p.date).filter(Boolean))].sort();
        setDates(allDates);
      };

      const saveScheduled = (places) => {
        localStorage.setItem('jejuScheduled', JSON.stringify(places));
      };

      const updateMapMarkers = () => {
        Object.values(markersRef.current).forEach(m => m.setMap(null));
        markersRef.current = {};

        const filteredPlaces = selectedDate 
          ? scheduledPlaces.filter(p => p.date === selectedDate) 
          : scheduledPlaces;

        filteredPlaces.forEach((place, idx) => {
          const marker = new naver.maps.Marker({
            position: new naver.maps.LatLng(place.lat, place.lng),
            map: map.current,
            title: place.name,
          });

          naver.maps.Event.addListener(marker, 'click', () => {
            alert(`${place.name}\n${place.address}`);
          });

          markersRef.current[idx] = marker;
        });

        if (filteredPlaces.length > 0 && map.current) {
          const bounds = new naver.maps.LatLngBounds();
          filteredPlaces.forEach(p => {
            bounds.extend(new naver.maps.LatLng(p.lat, p.lng));
          });
          map.current.fitBounds(bounds);
        }
      };

      const deleteScheduled = (id) => {
        setScheduledPlaces(scheduledPlaces.filter(p => p.id !== id));
      };

      const openNavigation = (name) => {
        window.open(`https://map.naver.com/v5/search/${encodeURIComponent(name)}`, '_blank');
      };

      const filteredScheduled = selectedDate
        ? scheduledPlaces.filter(p => p.date === selectedDate)
        : scheduledPlaces;

      return (
        <div className="container">
          <div className="sidebar">
            <div className="header">
              <h1>📍 제주도 여행</h1>
              <p>{scheduledPlaces.length}개 일정 • {referencePlaces.length}개 레퍼런스</p>
            </div>

            <div className="tabs">
              <div
                className={`tab ${activeTab === 'schedule' ? 'active' : ''}`}
                onClick={() => setActiveTab('schedule')}
              >
                📅 일정
              </div>
              <div
                className={`tab ${activeTab === 'reference' ? 'active' : ''}`}
                onClick={() => setActiveTab('reference')}
              >
                📍 레퍼런스
              </div>
            </div>

            <div className="content-area">
              {activeTab === 'schedule' ? (
                <>
                  {dates.length > 0 && (
                    <div className="date-filter">
                      {dates.map((date) => (
                        <button
                          key={date}
                          className={`date-btn ${selectedDate === date ? 'active' : ''}`}
                          onClick={() => setSelectedDate(date)}
                        >
                          {new Date(date + 'T00:00').toLocaleDateString('ko-KR', {
                            month: 'short',
                            day: 'numeric',
                          })}
                        </button>
                      ))}
                    </div>
                  )}

                  {filteredScheduled.length > 0 ? (
                    <div>
                      {filteredScheduled.map((place) => (
                        <div key={place.id} className="scheduled-item">
                          <div className="place-name">{place.name}</div>
                          <div className="place-date">📅 {place.date} • 🕐 {place.time}</div>
                          <div className="place-category">{place.category}</div>
                          <div className="place-address">{place.address}</div>
                          <div className="place-actions">
                            <button
                              className="btn-small nav"
                              onClick={() => openNavigation(place.name)}
                            >
                              🗺️ 지도
                            </button>
                            <button
                              className="btn-small danger"
                              onClick={() => deleteScheduled(place.id)}
                            >
                              🗑️ 삭제
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <div className="empty-state">
                      {selectedDate
                        ? `${selectedDate}에 계획된 일정이 없습니다`
                        : '계획된 일정이 없습니다'}
                    </div>
                  )}
                </>
              ) : (
                <>
                  <div style={{fontSize: '12px', color: '#999', marginBottom: '12px'}}>
                    💡 식당, 카페, 관광지를 클릭하면 자세한 정보를 볼 수 있습니다
                  </div>
                  {referencePlaces.map((place) => (
                    <div key={place.id} className="place-item">
                      <div className="place-name">{place.name}</div>
                      <div className="place-category">{place.category}</div>
                      <div className="place-address">{place.address}</div>
                      {place.phone && <div className="place-phone">☎️ {place.phone}</div>}
                      <div className="place-actions">
                        <button
                          className="btn-small nav"
                          onClick={() => openNavigation(place.name)}
                        >
                          🗺️ 네비
                        </button>
                      </div>
                    </div>
                  ))}
                </>
              )}
            </div>
          </div>

          <div className="map-wrapper">
            <div ref={mapRef} id="map"></div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<JejuTripPlanner />, document.getElementById('root'));
  </script>
</body>
</html>
